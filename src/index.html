<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cookie Clicker Benchmarking Tool</title>

		<link rel="stylesheet" href="style.css" />
		<link rel="shortcut icon" href="images/cookie.png" type="image/x-icon" />
	</head>
	<body>

		<header>
			<img src="images/cookie.png" alt="" />
			<h1>Cookie Clicker Benchmarking Tool</h1>
		</header>
		
		<main>
			<div class="config-menu">
				<div class="section">
					<div class="section-title">Algorithm Selection</div>
					<div class="field">
						<p class="algo-selected" id="algo-count">0 algorithms selected</p>
						<label for="algo-select">Select one or more algorithms to benchmark</label>
						<select id="algo-select" multiple>
							<option value="immediate">[Greedy] Immediate Purchase Strategy</option>
							<option value="greedy">[Greedy] Payback Period / Greedy Time</option>
							<option value="bruteforce">[Modified] Brute Force</option>
							<option value="dp">Dynamic Programming</option>
						</select>
						<p class="algo-hint">Hold Ctrl / Cmd to select multiple algorithms.</p>
					</div>

					<div class="conditional" id="cond-bruteforce">
						<div class="field">
							<label for="bruteforce-segment">Brute-force segment size</label>
							<input type="number" id="bruteforce-segment" min="1" value="5">
						</div>
					</div>
				</div>

				<div class="section">
					<div class="section-title">Benchmark Target</div>
					<div class="grid2">
						<div class="field">
							<label for="target-type">Target type</label>
							<select id="target-type">
								<option value="cookies">Reach X cookies</option>
								<option value="production">Reach X production rate</option>
							</select>
						</div>
						<div class="field">
							<label for="target-value">Target value</label>
							<input type="number" id="target-value" min="0" value="1000">
						</div>
					</div>
				</div>

				<div class="section">
					<div class="section-title">Simulation Constraints</div>
					<div class="field">
						<label for="max-sim-time">Max simulation time (seconds)</label>
						<input type="number" id="max-sim-time" min="1" value="3600">
					</div>
				</div>

				<div class="actions">
					<button class="btn-primary" id="btn-run">Run benchmark</button>
					<button class="btn-reset" id="btn-reset">Reset</button>
					<span class="toast" id="toast"></span>
				</div>
			</div>

		</main>
		
		<footer></footer>
		
		<script src="script.js"></script>
	</body>
</html>
