<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Cookie Clicker Benchmarking Tool</title>

		<link rel="stylesheet" href="style.css" />
		<link rel="shortcut icon" href="images/cookie.png" type="image/x-icon" />
		<script src="script.js" type="module"></script>
	</head>
	<body>
		<header>
			<img src="images/cookie.png" alt="Cookie Image" />
			<h1>Cookie Clicker Benchmarking Tool</h1>
		</header>

		<main>
			<form>
				<section>
					<h2>Algorithm Selection</h2>
					<div class="field">
						<p class="algorithm-selected" id="algorithm-count">
							0 algorithms selected
						</p>
						<label for="algorithm-select"
							>Select one or more algorithms to benchmark</label
						>
						<div class="algorithms"></div>
					</div>
				</section>

				<section>
					<h2>Benchmark Objective</h2>
					<div class="grid-2">
						<div class="field">
							<label for="objective-type">
								<p>Objective type</p>
								<select id="objective-type">
									<option value="cookies">Cookies</option>
									<option value="production">Production Rate</option>
									<option value="time limit">Time Limit</option>
								</select>
							</label>
						</div>
						<div class="field">
							<label for="objective-value">
								<p>Objective value</p>
								<input
									type="number"
									id="objective-value"
									min="1"
									value="1000"
								/>
							</label>
						</div>
					</div>
				</section>

				<section>
					<h2>Simulation Constraints</h2>
					<div class="field">
						<label for="max-sim-time">
							<p>Max Simulation Time (s)</p>
							<input type="number" id="max-sim-time" min="1" value="3600" />
						</label>
					</div>
				</section>

				<div class="actions">
					<button type="submit" disabled>Run Benchmark</button>
					<button type="reset">Reset</button>
				</div>
			</form>
			<hr />
			<div class="benchmark-results">
				<section>
					<h2>Results</h2>
					<canvas width="1920" height="1080"></canvas>
					<table class="result-data">
						<thead>
							<tr>
								<th>Algorithm</th>
								<th>Simulation Time (ms)</th>
								<th>Real Time (s)</th>
								<th>Total Cookies</th>
								<th>CpS</th>
							</tr>
						</thead>
						<tbody></tbody>
					</table>
				</section>
			</div>
		</main>

		<span class="toast">
			<h2>Toast Title</h2>
			<p>Toast Message</p>
		</span>

		<footer></footer>
	</body>
</html>
